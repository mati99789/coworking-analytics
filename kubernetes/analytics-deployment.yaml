apiVersion: v1
kind: Service
metadata:
  name: analytics
spec:
  type: LoadBalancer
  selector:
    app: analytics
  ports:
    - name: "5153"
      protocol: TCP
      port: 5153
      targetPort: 5153
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: 448037225605.dkr.ecr.us-east-1.amazonaws.com/analytics:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5153

          livenessProbe:
            httpGet:
              path: /health_check
              port: 5153
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /readiness_check
              port: 5153
            initialDelaySeconds: 5
            periodSeconds: 5

          envFrom:
            - configMapRef:
                name: analytics-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password

      restartPolicy: Always
